
 <section class="page">
  <header class="page-header">
    <h1>All Predictions <ng-container *ngIf="ticker">for {{ ticker }}</ng-container></h1>
  </header>

  <div *ngIf="loading">Loading…</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <app-prediction-list
    *ngIf="!loading && !error"
    [predictions]="predictions">
  </app-prediction-list>
</section>
